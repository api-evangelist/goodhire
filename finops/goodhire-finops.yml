  unit: reports
  aggregation: sum
  dimensions:
  - company
  - requestor
  - productBundle
- name: addon_screenings
  description: Incremental add-on screenings (verifications, references, MVR, drug testing) applied to reports.
  unit: screenings
  aggregation: sum
  dimensions:
  - company
  - requestor
  - screeningType
principles:
- name: Visibility
  description: Track reports ordered per company, requestor, and package so background-check spend is attributable to teams and hiring workflows.
- name: Allocation
  description: Use requestors and billing codes (request option) to map report spend to internal cost centers and roles.
- name: Optimization
  description: Match the package to the role's risk profile rather than defaulting to Complete; add screenings only where required by policy or law.
- name: Accountability
  description: Assign owners per requestor/department and review monthly report volume and add-on spend against hiring budgets.

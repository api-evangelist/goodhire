description: >-
  FinOps view of GoodHire spend. GoodHire is billed per completed background check
  by screening package (product bundle) - there is no separate API subscription
  fee, so cost tracks the number and type of reports ordered through the API. The
  dominant cost driver is package selection (Basic $29.99, Essential $59.99,
  Complete $94.99 per check on the public preset tiers) plus any add-on screenings
  (employment/education verification, references, MVR, drug testing, etc.).
  Sandbox usage is free. As part of Checkr, high-volume and Partner API pricing is
  negotiated.
notes: >-
  Per-unit prices are from the public pricing page and are subject to change;
  reconcile via the product bundles endpoint at order time. Add-ons and
  verifications carry incremental per-report cost.

aid: goodhire
url: https://raw.githubusercontent.com/api-evangelist/goodhire/refs/heads/main/apis.yml
name: GoodHire
kind: company
description: GoodHire is an FCRA-compliant employment background check platform aimed
  at small and midsize businesses, offering criminal, identity, employment, education,
  and reference screening with candidate self-consent workflows. GoodHire was acquired
  by Checkr (the developer-first background check company) in 2021 - the deal was
  reported at roughly $400M - and now operates as "GoodHire, A Checkr Company." The
  GoodHire API is a RESTful, FCRA-compliant background screening API split into a
  Customer API (a single company ordering its own reports) and a Partner API (HR
  platforms that let their employer customers order GoodHire reports). Background
  checks are ordered by creating a report object tied to a candidate and a package;
  status changes are delivered via webhooks. API keys are gated - developers request
  access from api@goodhire.com and build against a sandbox before production.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Background Checks
- Employment Screening
